<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Tennis Scorer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a472a;
    color: white;
    font-family: 'Segoe UI', Arial, sans-serif;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .waiting {
    text-align: center;
    font-size: 3vw;
    color: rgba(255,255,255,0.6);
  }
  .waiting .icon { font-size: 8vw; margin-bottom: 2vh; }

  #scoreboard { display: none; width: 90vw; }

  .match-header {
    text-align: center;
    margin-bottom: 3vh;
  }
  .match-header .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.8vw;
    background: rgba(255,0,0,0.2);
    border: 1px solid rgba(255,0,0,0.5);
    border-radius: 2vw;
    padding: 0.4vh 1.5vw;
    font-size: 1.8vw;
    font-weight: 600;
    color: #ff4444;
    margin-bottom: 1vh;
  }
  .live-dot {
    width: 1vw; height: 1vw;
    background: #ff4444;
    border-radius: 50%;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }
  .match-header .format {
    font-size: 1.6vw;
    color: rgba(255,255,255,0.5);
  }

  .score-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    background: rgba(0,0,0,0.3);
    border-radius: 1.5vw;
    overflow: hidden;
    margin-bottom: 3vh;
  }
  .score-table th, .score-table td {
    padding: 1.5vh 2vw;
    text-align: center;
    font-size: 2.5vw;
  }
  .score-table th {
    background: rgba(0,0,0,0.3);
    color: rgba(255,255,255,0.5);
    font-size: 1.6vw;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1vw;
  }
  .score-table .player-name {
    text-align: left;
    font-weight: 700;
    font-size: 2.8vw;
    min-width: 25vw;
  }
  .score-table .player-name .serving {
    display: inline-block;
    width: 1vw; height: 1vw;
    background: #c8e62e;
    border-radius: 50%;
    margin-left: 0.8vw;
    vertical-align: middle;
  }
  .score-table tr:first-child td {
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .score-table .set-score { color: rgba(255,255,255,0.7); font-weight: 500; }
  .score-table .current-set { color: #c8e62e; font-weight: 700; }
  .score-table .game-points {
    font-weight: 800;
    font-size: 3.5vw;
    min-width: 8vw;
  }

  .points-display {
    text-align: center;
    margin-bottom: 2vh;
  }
  .points-text {
    font-size: 6vw;
    font-weight: 800;
    color: #c8e62e;
    text-shadow: 0 0 3vw rgba(200,230,46,0.3);
  }
  .points-label {
    font-size: 1.6vw;
    color: rgba(255,255,255,0.4);
    margin-top: 0.5vh;
  }

  .winner-banner {
    display: none;
    text-align: center;
    margin-top: 2vh;
  }
  .winner-banner .trophy { font-size: 6vw; }
  .winner-banner .winner-text {
    font-size: 4vw;
    font-weight: 800;
    color: #ffd700;
    text-shadow: 0 0 2vw rgba(255,215,0,0.5);
  }
  .winner-banner .wins-text {
    font-size: 2vw;
    color: rgba(255,255,255,0.6);
  }

  #winner-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.88);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  #winner-overlay.show {
    display: flex;
    animation: overlayAppear 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  .wo-trophy {
    font-size: 14vw;
    animation: trophyPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s both;
  }
  .wo-name {
    font-size: 7vw;
    font-weight: 800;
    color: #ffd700;
    text-shadow: 0 0 4vw rgba(255,215,0,0.6);
    margin: 2vh 0 1vh;
    animation: fadeSlideUp 0.5s ease-out 0.7s both;
  }
  .wo-subtitle {
    font-size: 2.5vw;
    color: rgba(255,255,255,0.6);
    animation: fadeSlideUp 0.5s ease-out 0.85s both;
  }
  .wo-score {
    font-size: 3.5vw;
    color: rgba(255,255,255,0.9);
    font-weight: 600;
    margin-top: 2vh;
    animation: fadeSlideUp 0.5s ease-out 1s both;
  }
  @keyframes overlayAppear {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes trophyPop {
    from { transform: scale(0) rotate(-30deg); opacity: 0; }
    to { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(2vh); }
    to { opacity: 1; transform: translateY(0); }
  }

  .duration {
    text-align: center;
    font-size: 1.4vw;
    color: rgba(255,255,255,0.3);
    margin-top: 2vh;
  }

  .court-lines {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: -1;
  }
  .court-lines::before {
    content: '';
    position: absolute;
    top: 5vh; bottom: 5vh; left: 10vw; right: 10vw;
    border: 2px solid rgba(255,255,255,0.06);
    border-radius: 0.5vw;
  }
  .court-lines::after {
    content: '';
    position: absolute;
    top: 5vh; bottom: 5vh;
    left: 50%; width: 2px;
    background: rgba(255,255,255,0.06);
  }

  .tiebreak-label {
    display: none;
    text-align: center;
    font-size: 1.6vw;
    color: #c8e62e;
    font-weight: 600;
    margin-bottom: 1vh;
  }
</style>
</head>
<body>

<div class="court-lines"></div>

<div id="waiting" class="waiting">
  <div class="icon">&#127934;</div>
  <div>Waiting for match data...</div>
</div>

<div id="scoreboard">
  <div class="match-header">
    <div class="live-badge"><div class="live-dot"></div> LIVE</div>
    <div class="format" id="matchFormat"></div>
  </div>

  <table class="score-table">
    <thead>
      <tr>
        <th></th>
        <th id="s1h" style="display:none">S1</th>
        <th id="s2h" style="display:none">S2</th>
        <th id="s3h" style="display:none">S3</th>
        <th id="s4h" style="display:none">S4</th>
        <th id="s5h" style="display:none">S5</th>
        <th class="current-set">GM</th>
        <th>PTS</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td class="player-name" id="playerAName"></td>
        <td class="set-score" id="s1a" style="display:none"></td>
        <td class="set-score" id="s2a" style="display:none"></td>
        <td class="set-score" id="s3a" style="display:none"></td>
        <td class="set-score" id="s4a" style="display:none"></td>
        <td class="set-score" id="s5a" style="display:none"></td>
        <td class="current-set" id="gamesA"></td>
        <td class="game-points" id="ptsA"></td>
      </tr>
      <tr>
        <td class="player-name" id="playerBName"></td>
        <td class="set-score" id="s1b" style="display:none"></td>
        <td class="set-score" id="s2b" style="display:none"></td>
        <td class="set-score" id="s3b" style="display:none"></td>
        <td class="set-score" id="s4b" style="display:none"></td>
        <td class="set-score" id="s5b" style="display:none"></td>
        <td class="current-set" id="gamesB"></td>
        <td class="game-points" id="ptsB"></td>
      </tr>
    </tbody>
  </table>

  <div class="tiebreak-label" id="tiebreakLabel">TIEBREAK</div>

  <div class="points-display">
    <div class="points-text" id="pointsText"></div>
    <div class="points-label" id="pointsLabel"></div>
  </div>

  <div class="winner-banner" id="winnerBanner">
    <div class="trophy">&#127942;</div>
    <div class="winner-text" id="winnerName"></div>
    <div class="wins-text">wins the match!</div>
  </div>

  <div class="duration" id="duration"></div>
</div>

<div id="winner-overlay">
  <div class="wo-trophy">&#127942;</div>
  <div class="wo-name" id="woName"></div>
  <div class="wo-subtitle">wins the match!</div>
  <div class="wo-score" id="woScore"></div>
</div>

<script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
<script>
  const context = cast.framework.CastReceiverContext.getInstance();
  const NAMESPACE = 'urn:x-cast:com.matt.tennisscorer';

  function teamName(config, side) {
    if (config.matchType === 'DOUBLES') {
      if (side === 'A') {
        return config.playerA2 ? config.playerA + ' / ' + config.playerA2 : config.playerA;
      } else {
        return config.playerB2 ? config.playerB + ' / ' + config.playerB2 : config.playerB;
      }
    }
    return side === 'A' ? config.playerA : config.playerB;
  }

  function mapPoint(raw) {
    switch(raw) {
      case 0: return 'Love';
      case 1: return '15';
      case 2: return '30';
      default: return '40';
    }
  }

  // Deuce-aware point display for per-player table cells
  function cellPoint(rawThis, rawOther) {
    if (rawThis >= 3 && rawOther >= 3) {
      return rawThis > rawOther ? 'Ad' : '40';
    }
    return mapPoint(rawThis);
  }

  function formatLabel(format) {
    switch(format) {
      case 'BEST_OF_5':     return 'Best of 5 Sets';
      case 'SHORT_SETS':    return 'Short Sets';
      case 'NO_AD':         return 'No-Ad Scoring';
      case 'TIEBREAK_ONLY': return 'Tiebreak Only';
      default:              return 'Best of 3 Sets';
    }
  }

  function displayPoints(state) {
    var gp = state.currentGame || {rawA: 0, rawB: 0, tiebreak: false};
    var serverSide = state.server || 'A';
    var receiverSide = serverSide === 'A' ? 'B' : 'A';
    var serverRaw = serverSide === 'A' ? gp.rawA : gp.rawB;
    var receiverRaw = serverSide === 'A' ? gp.rawB : gp.rawA;
    var sName = teamName(state.config, serverSide);
    var rName = teamName(state.config, receiverSide);

    if (gp.tiebreak) {
      return serverRaw + ' - ' + receiverRaw;
    }
    if (serverRaw === 0 && receiverRaw === 0) return 'Love All';
    if (serverRaw >= 3 && receiverRaw >= 3) {
      if (state.config.format === 'NO_AD') return '40 - 40';
      if (serverRaw === receiverRaw) return 'Deuce';
      if (serverRaw > receiverRaw) return 'Adv. ' + sName;
      return 'Adv. ' + rName;
    }
    if (serverRaw === receiverRaw) return mapPoint(serverRaw) + ' All';
    return mapPoint(serverRaw) + ' - ' + mapPoint(receiverRaw);
  }

  function showCell(el) {
    // Explicitly set display type based on element tag
    el.style.display = el.tagName === 'TH' ? 'table-cell' : 'table-cell';
  }

  function hideCell(el) {
    el.style.display = 'none';
  }

  function updateScoreboard(state) {
    // Ensure all fields have sane defaults (kotlinx.serialization may omit default-valued fields)
    state.completedSets = state.completedSets || [];
    state.currentGamesA = state.currentGamesA || 0;
    state.currentGamesB = state.currentGamesB || 0;
    state.pointNumber = state.pointNumber || 0;
    state.currentGame = state.currentGame || {};
    state.currentGame.rawA = state.currentGame.rawA || 0;
    state.currentGame.rawB = state.currentGame.rawB || 0;
    state.currentGame.tiebreak = state.currentGame.tiebreak || false;

    document.getElementById('waiting').style.display = 'none';
    document.getElementById('scoreboard').style.display = 'block';

    var serverSide = state.server || 'A';
    var servingDot = '<span class="serving"></span>';

    document.getElementById('playerAName').innerHTML =
      teamName(state.config, 'A') + (serverSide === 'A' ? servingDot : '');
    document.getElementById('playerBName').innerHTML =
      teamName(state.config, 'B') + (serverSide === 'B' ? servingDot : '');

    document.getElementById('matchFormat').textContent = formatLabel(state.config.format);

    // Completed sets — show each set column exactly as needed, hide the rest
    var numCompleted = state.completedSets ? state.completedSets.length : 0;
    for (var i = 1; i <= 5; i++) {
      var sh = document.getElementById('s' + i + 'h');
      var sa = document.getElementById('s' + i + 'a');
      var sb = document.getElementById('s' + i + 'b');
      if (i <= numCompleted) {
        showCell(sh);
        showCell(sa);
        showCell(sb);
        sa.textContent = state.completedSets[i - 1].gamesA;
        sb.textContent = state.completedSets[i - 1].gamesB;
      } else {
        hideCell(sh);
        hideCell(sa);
        hideCell(sb);
        sa.textContent = '';
        sb.textContent = '';
      }
    }

    // Current set game scores
    document.getElementById('gamesA').textContent = state.currentGamesA;
    document.getElementById('gamesB').textContent = state.currentGamesB;

    // Current game points — per player cells
    var gp = state.currentGame || {rawA: 0, rawB: 0, tiebreak: false};
    if (gp.tiebreak) {
      document.getElementById('ptsA').textContent = gp.rawA;
      document.getElementById('ptsB').textContent = gp.rawB;
      document.getElementById('tiebreakLabel').style.display = 'block';
      document.getElementById('pointsLabel').textContent = 'Tiebreak';
    } else {
      document.getElementById('ptsA').textContent = cellPoint(gp.rawA, gp.rawB);
      document.getElementById('ptsB').textContent = cellPoint(gp.rawB, gp.rawA);
      document.getElementById('tiebreakLabel').style.display = 'none';
      document.getElementById('pointsLabel').textContent = '';
    }

    // Verbal score display
    document.getElementById('pointsText').textContent = displayPoints(state);

    // Winner
    if (state.winner) {
      var winnerName = teamName(state.config, state.winner);
      document.getElementById('winnerBanner').style.display = 'block';
      document.getElementById('winnerName').textContent = winnerName;
      document.querySelector('.live-badge').style.display = 'none';
      document.getElementById('pointsText').textContent = '';
      document.getElementById('pointsLabel').textContent = 'Final';

      // Full-screen winner overlay
      var overlay = document.getElementById('winner-overlay');
      if (!overlay.classList.contains('show')) {
        document.getElementById('woName').textContent = winnerName;
        var sets = state.completedSets || [];
        var scoreStr = sets.map(function(s) { return s.gamesA + '-' + s.gamesB; }).join('  ');
        document.getElementById('woScore').textContent = scoreStr;
        overlay.classList.add('show');
      }
    } else {
      document.getElementById('winnerBanner').style.display = 'none';
      document.querySelector('.live-badge').style.display = 'inline-flex';
      document.getElementById('winner-overlay').classList.remove('show');
    }

    // Duration
    if (state.startedAtMs) {
      var endTime = state.endedAtMs || Date.now();
      var elapsed = Math.floor((endTime - state.startedAtMs) / 1000);
      var hrs = Math.floor(elapsed / 3600);
      var mins = Math.floor((elapsed % 3600) / 60);
      var durText = hrs > 0 ? hrs + 'h ' + mins + 'm' : mins + ' min';
      document.getElementById('duration').textContent = 'Duration: ' + durText;
    }
  }

  context.addCustomMessageListener(NAMESPACE, function(event) {
    try {
      var state = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
      updateScoreboard(state);
    } catch(e) {
      console.error('Failed to parse score data', e);
    }
  });

  var options = new cast.framework.CastReceiverOptions();
  options.disableIdleTimeout = true;
  context.start(options);
</script>
</body>
</html>
